<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 - CSS Grid<</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
     <!-- Task 1 - Card Grid with Featured -->
  <h2>Task 1 - Card Grid</h2>
  <div class="card-grid">
    <div class="card featured">Featured Post</div>
    <div class="card">Post 1</div>
    <div class="card">Post 2</div>
    <div class="card">Post 3</div>
    <div class="card">Post 4</div>
    <div class="card">Post 5</div>
  </div>

  <!-- Task 2 - Sidebar Layout -->
  <h2>Task 2 - Sidebar Layout</h2>
  <div class="page-layout">
    <aside class="sidebar">Sidebar</aside>
    <main class="content">Main Content</main>
  </div>

  <!-- Task 3 - Auto Responsive Grid -->
  <h2>Task 3 - Responsive Grid</h2>
  <div class="auto-grid">
    <div class="auto-card">Card 1</div>
    <div class="auto-card">Card 2</div>
    <div class="auto-card">Card 3</div>
    <div class="auto-card">Card 4</div>
    <div class="auto-card">Card 5</div>
    <div class="auto-card">Card 6</div>
    <div class="auto-card">Card 7</div>
    <div class="auto-card">Card 8</div>
  </div>
</body>
</html>
